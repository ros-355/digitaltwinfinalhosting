<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Substation Digital Twin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); 
        }

        .login-box { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); 
            width: 350px; 
            text-align: center; 
            border-top: 5px solid #3498db;
        }

        .logo { height: 70px; margin-bottom: 15px; }

        h2 { 
            font-family: 'Montserrat', sans-serif;
            color: #2c3e50; 
            margin: 0 0 5px 0;
            font-size: 1.5em;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        /* Error Message Styling */
        .error-alert {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #f5c6cb;
            margin-bottom: 20px;
            font-size: 0.85em;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px;
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: #3498db; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            transition: 0.3s;
        }

        button:hover { background: #2980b9; }

        .footer-note {
            margin-top: 25px;
            font-size: 0.75em;
            color: #bdc3c7;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="{{ url_for('static', filename='ioelogo.png') }}" alt="IOE Logo" class="logo">
        <h2>System Login</h2>
        <div class="subtitle">Substation Monitoring</div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error-alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="User ID" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">LOGIN TO DASHBOARD</button>
        </form>

        <div class="footer-note">
            Electrical Engineering Department, IOE PC
        </div>
    </div>
</body>
</html>
